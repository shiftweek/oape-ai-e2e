apiVersion: v1
kind: ServiceAccount
metadata:
  name: shift-go-server
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.shift-go-server: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"shift-go-server"}}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shift-job-manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shift-job-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: shift-job-manager
subjects:
  - kind: ServiceAccount
    name: shift-go-server
    # namespace: placeholder # Automatically updated by Kustomize, DO NOT FILL.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shift-go-server
  labels:
    app: shift-go-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shift-go-server
  template:
    metadata:
      labels:
        app: shift-go-server
    spec:
      serviceAccountName: shift-go-server
      containers:
        - name: shift-go-server
          image: ghcr.io/openshift-eng/oape-ai-e2e/go-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: WORKER_IMAGE
              value: ghcr.io/openshift-eng/oape-ai-e2e/agent-worker:latest
            - name: GH_TOKEN_SERVICE_URL
              value: http://localhost:8081
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
        - name: ghpat-sidecar
          image: ghcr.io/openshift-eng/oape-ai-e2e/gh-token-minter:latest
          ports:
            - containerPort: 8081
          env:
            - name: GH_APP_ID
              value: "3065249"
            - name: GH_APP_PEM_FILE_PATH
              value: /etc/github-app/private-key.pem
            - name: LISTEN_PORT
              value: "8081"
          volumeMounts:
            - name: gh-app-key
              mountPath: /etc/github-app
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:v4.21
          imagePullPolicy: IfNotPresent
          args:
            - -provider=openshift
            - -https-address=:8888
            - -http-address=
            - -email-domain=*
            - -upstream=http://localhost:8080
            - -tls-cert=/etc/tls/private/tls.crt
            - -tls-key=/etc/tls/private/tls.key
            - -cookie-secret-file=/etc/proxy/secrets/session_secret
            - -openshift-service-account=shift-go-server
            - -openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - -skip-auth-regex=^/metrics
          ports:
            - name: oauth-proxy
              containerPort: 8888
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: secret-shift-go-server-tls
              mountPath: /etc/tls/private
            - name: secret-shift-go-server-proxy
              mountPath: /etc/proxy/secrets
      volumes:
        - name: config
          configMap:
            name: shift-server-config
        - name: gh-app-key
          secret:
            secretName: github-app
        - name: secret-shift-go-server-tls
          secret:
            defaultMode: 420
            secretName: shift-go-server-tls
        - name: secret-shift-go-server-proxy
          secret:
            defaultMode: 420
            secretName: shift-go-server-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: shift-go-server
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: shift-go-server-tls
spec:
  selector:
    app: shift-go-server
  ports:
    - name: proxy
      port: 8080
      protocol: TCP
      targetPort: oauth-proxy
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: shift-go-server
spec:
  to:
    kind: Service
    name: shift-go-server
  port:
    targetPort: proxy
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
