apiVersion: v1
kind: ConfigMap
metadata:
  name: oape-server-config
data:
  CLAUDE_CODE_USE_VERTEX: "1"
  CLOUD_ML_REGION: "us-east5"
  ANTHROPIC_VERTEX_PROJECT_ID: "[gcp-project-id]"
  ANTHROPIC_MODEL: "claude-opus-4-6"
---
apiVersion: v1
kind: Secret
metadata:
  name: gcloud-adc-secret
type: Opaque
stringData:
  # Replace with ~/.config/gcloud/application_default_credentials.json
  # that can authenticate with GCP project.
  application_default_credentials.json: '{}'
---
apiVersion: v1
kind: Secret
metadata:
  name: gh-app-secret
type: Opaque
stringData:
  # Replace with your GitHub App private key (.pem file)
  bot-key.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    <key>
    -----END RSA PRIVATE KEY-----
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oape-server
  labels:
    app: oape-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oape-server
  template:
    metadata:
      labels:
        app: oape-server
    spec:
      containers:
        - name: oape-server
          image: ghcr.io/shiftweek/oape-ai-e2e:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: oape-server-config
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcloud/application_default_credentials.json
          volumeMounts:
            - name: gcloud-adc
              mountPath: /secrets/gcloud
              readOnly: true
            - name: gh-token-shared
              mountPath: /shared
              readOnly: true
            - name: config
              mountPath: /config
              readOnly: true
        - name: ghtoken-sidecar
          image: ghcr.io/shiftweek/oape-ai-e2e:latest
          command: ["/opt/ghtoken/token-refresh.sh"]
          env:
            - name: GH_APP_ID
              value: "3065249" # Replace with GitHub App ID if otherwise
            - name: GH_APP_PEM_FILE_PATH
              value: /secrets/gh-app/bot-key.pem
          volumeMounts:
            - name: gh-app-key
              mountPath: /secrets/gh-app
              readOnly: true
            - name: gh-token-shared
              mountPath: /shared
      volumes:
        - name: gcloud-adc
          secret:
            secretName: gcloud-adc-secret
        - name: gh-app-key
          secret:
            secretName: gh-app-secret
        - name: gh-token-shared
          emptyDir: {}
        - name: config
          configMap:
            name: oape-configs
---
apiVersion: v1
kind: Service
metadata:
  name: oape-server
spec:
  selector:
    app: oape-server
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
