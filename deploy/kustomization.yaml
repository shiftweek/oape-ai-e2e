apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shift-ai-v1
resources:
  - secret-configs.yaml
  - deployment.yaml

configMapGenerator:
  - name: oape-configs
    files:
      - ./config/config.json
      - ./config/team-repos.csv
    options:
      disableNameSuffixHash: true
