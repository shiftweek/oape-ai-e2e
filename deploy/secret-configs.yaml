apiVersion: v1
kind: Secret
metadata:
  name: shift-go-server-proxy
type: Opaque
stringData:
  # Replace with a random 43-character string:
  # head /dev/urandom | tr -dc A-Za-z0-9 | head -c43
  session_secret: "REPLACE_WITH_43_CHAR_RANDOM_STRING"
---
apiVersion: v1
kind: Secret
metadata:
  name: github-app
type: Opaque
stringData:
  # Replace with your GitHub App private key (.pem file)
  private-key.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    <key>
    -----END RSA PRIVATE KEY-----
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shift-worker-config
data:
  CLAUDE_CODE_USE_VERTEX: "1"
  CLOUD_ML_REGION: "us-east5"
  ANTHROPIC_VERTEX_PROJECT_ID: "[gcp-project-id]"
  ANTHROPIC_MODEL: "claude-opus-4-6"
  config.json: |
    {
        "claude_allowed_tools": [
            "Bash(*)",
            "Read",
            "Write",
            "Edit",
            "Glob",
            "Grep",
            "WebFetch",
            "Task"
        ]
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: gcloud-adc
type: Opaque
stringData:
  # Replace with ~/.config/gcloud/application_default_credentials.json
  application_default_credentials.json: '{}'
