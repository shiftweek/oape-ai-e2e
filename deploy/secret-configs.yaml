apiVersion: v1
kind: ConfigMap
metadata:
  name: oape-server-config
data:
  CLAUDE_CODE_USE_VERTEX: "1"
  CLOUD_ML_REGION: "us-east5"
  ANTHROPIC_VERTEX_PROJECT_ID: "[gcp-project-id]" # Replace with GCP project id that has access to Anthropic models through Vertex
  ANTHROPIC_MODEL: "claude-opus-4-6"
---
apiVersion: v1
kind: Secret
metadata:
  name: gcloud-adc-secret
type: Opaque
stringData:
  # Replace with ~/.config/gcloud/application_default_credentials.json
  # that can authenticate with GCP project.
  application_default_credentials.json: '{}'
---
apiVersion: v1
kind: Secret
metadata:
  name: gh-app-secret
type: Opaque
stringData:
  # Replace with your GitHub App private key (.pem file)
  bot-key.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    <key>
    -----END RSA PRIVATE KEY-----
